  <main>

      <!-- BOOKING -->
<section id="booking">
      <div class="section-header">
        <div class="section-tag">// SPACE TOURISM — IMAGINARY VOYAGES</div>
        <h2 class="section-title">Book Your <span>Space Trip</span></h2>
      </div>

      <div class="booking-grid">

        <!-- LEFT SIDE -->
        <div class="booking-info">
          <h3>Available Missions</h3>

          <div class="trip-card">
            <div class="trip-name">LUNAR ORBIT CLASSIC</div>
            <div class="trip-price">$480,000</div>
          </div>

          <div class="trip-card">
            <div class="trip-name">MARS COLONY PIONEER</div>
            <div class="trip-price">$12,500,000</div>
          </div>

          <div class="trip-card">
            <div class="trip-name">SATURN RINGS FLYBY</div>
            <div class="trip-price">$95,000,000</div>
          </div>
        </div>

        <!-- RIGHT SIDE FORM -->
        <div>

          <form action="success.html" method="POST" target="resultFrame">

            <div class="form-title">⬡ RESERVATION TERMINAL</div>

            <div class="form-row">
              <label class="form-label">SELECT MISSION</label>
              <select class="form-select" name="mission">
                <option>Lunar Orbit Classic</option>
                <option>Mars Colony Pioneer</option>
                <option>Saturn Rings Flyby</option>
              </select>
            </div>

            <div class="form-row-2">
              <div>
                <label class="form-label">FIRST NAME</label>
                <input type="text" name="firstName" class="form-input" required>
              </div>

              <div>
                <label class="form-label">LAST NAME</label>
                <input type="text" name="lastName" class="form-input" required>
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">EMAIL ADDRESS</label>
              <input type="email" name="email" class="form-input" required>
            </div>

            <div class="form-row">
              <label class="form-label">DEPARTURE YEAR</label>
              <select class="form-select" name="year">
                <option>2027</option>
                <option>2028</option>
                <option>2029</option>
                <option>2030</option>
              </select>
            </div>

            <div class="form-row">
              <label class="form-label">PASSENGERS</label>
              <select class="form-select" name="passengers">
                <option>1</option>
                <option>2</option>
                <option>3</option>
              </select>
            </div>

            <div class="form-row">
              <label class="form-label">SPECIAL REQUIREMENTS</label>
              <input type="text" name="notes" class="form-input">
            </div>

            <div class="form-row">
              <button class="submit-btn" type="submit">
                ⬡ CONFIRM MISSION RESERVATION
              </button>
            </div>

          </form>

        

          <p class="booking-disclaimer">
            ⚠ IMAGINARY SERVICE · FOR EDUCATIONAL PURPOSES ONLY
          </p>

        </div>

      </div>
    </section>
    <section>
        <!-- IFRAME RESULT -->
          <iframe name="resultFrame" style="
            width:100%;
            height:600px;
            border:1px solid #00d4ff;
            margin-top:20px;
            background:black;
          "></iframe>
    </section>
